<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spiel – Sozialkredit-Initiative Schweiz</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    /* Override body overflow for game page so iframe fills the viewport */
    body { overflow: hidden; }
    .site-nav { position: fixed; top: 0; left: 0; right: 0; z-index: 200; }
    .game-embed {
      position: fixed;
      top: 64px;
      left: 0;
      right: 0;
      bottom: 0;
    }
    .game-embed iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
  </style>
</head>
<body>

<nav class="site-nav">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">
      <img src="website_material/Logo_Sozialkredit.png" alt="SKS Logo">
      <span>Sozialkredit-Initiative Schweiz</span>
    </a>
    <button class="nav-hamburger" aria-label="Navigation öffnen">
      <span></span><span></span><span></span>
    </button>
    <ul class="nav-links">
      <li><a href="index.html">Startseite</a></li>
      <li><a href="initiative.html">Initiative</a></li>
      <li><a href="bundesverfassung.html">Bundesverfassung</a></li>
      <li><a href="faktencheck.html">Faktencheck</a></li>
      <li><a href="testlauf.html">Testlauf</a></li>
      <li><a href="spiel.html">Spiel</a></li>
      <li><a href="spenden.html" class="nav-cta">Spenden</a></li>
    </ul>
  </div>
</nav>

<div class="game-embed">
  <iframe
    id="game-iframe"
    src="spiel/index.html"
    title="Helvetingen – Ein Tag als Bürger"
    allowfullscreen>
  </iframe>
</div>
<script>
  (function () {
    const p = new URLSearchParams(location.search);
    if (p.get('place') === '1') {
      document.getElementById('game-iframe').src = 'spiel/index.html?place=1';
    }
  })();
</script>

<!-- SIGNATURE MODAL -->
<div class="modal-overlay" id="signature-modal" role="dialog" aria-modal="true">
  <div class="modal">
    <div class="modal-header">
      <div><div class="section-label">Eidgenössische Volksinitiative</div><h2 style="margin-bottom:0;">Jetzt unterschreiben</h2></div>
      <button class="modal-close" aria-label="Schliessen">×</button>
    </div>
    <form id="signature-form">
      <div class="form-grid">
        <div class="form-group"><label class="form-label" for="sig-vorname">Vorname</label><input class="form-input" id="sig-vorname" type="text" required placeholder="Maria"></div>
        <div class="form-group"><label class="form-label" for="sig-nachname">Nachname</label><input class="form-input" id="sig-nachname" type="text" required placeholder="Muster"></div>
        <div class="form-group full"><label class="form-label" for="sig-adresse">Adresse</label><input class="form-input" id="sig-adresse" type="text" required placeholder="Musterstrasse 1"></div>
        <div class="form-group"><label class="form-label" for="sig-plz">PLZ</label><input class="form-input" id="sig-plz" type="text" required placeholder="9000" maxlength="4"></div>
        <div class="form-group"><label class="form-label" for="sig-ort">Ort</label><input class="form-input" id="sig-ort" type="text" required placeholder="St. Gallen"></div>
        <div class="form-group"><label class="form-label" for="sig-kanton">Kanton</label><select class="form-select" id="sig-kanton" required><option value="">Bitte wählen</option><option>Aargau</option><option>Bern</option><option>Genf</option><option>Jura</option><option>St. Gallen</option><option>Tessin</option><option>Wallis</option><option>Zürich</option></select></div>
        <div class="form-group"><label class="form-label" for="sig-geburt">Geburtsdatum</label><input class="form-input" id="sig-geburt" type="date" required></div>
        <div class="form-group full"><label class="form-label">Unterschrift</label><div class="signature-area">Hier unterschreiben (Klick zum Simulieren)</div></div>
        <div class="form-group full"><label class="form-checkbox"><input type="checkbox" required> Ich nehme die <a href="#" data-modal="privacy">Datenschutzerklärung</a> zur Kenntnis.</label></div>
      </div>
      <div class="form-actions">
        <button type="submit" class="btn btn-primary" style="flex:1;">Unterschrift einreichen</button>
        <button type="button" class="btn btn-outline modal-close">Abbrechen</button>
      </div>
    </form>
  </div>
</div>

<script src="scripts.js"></script>
<script>
  window.addEventListener('message', e => {
    if (e.data === 'openSignatureModal') {
      document.getElementById('signature-modal')?.classList.add('open');
    }
  });
</script>
</body>
</html>
